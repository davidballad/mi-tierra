# Firebase App Hosting configuration for Mi Tierra.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0        # Scale to zero when idle (cost-efficient for MVP)
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # ── Firebase Client SDK ───────────────────────────────────────────────────
  # Store these as Secret Manager secrets (see DEPLOYMENT.md → Step 6).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: mi-tierra-firebase-api-key

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: mi-tierra-firebase-auth-domain

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: mi-tierra-firebase-project-id

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: mi-tierra-firebase-storage-bucket

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: mi-tierra-firebase-messaging-sender-id

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: mi-tierra-firebase-app-id

  # ── Firebase Admin SDK ────────────────────────────────────────────────────
  - variable: FIREBASE_ADMIN_PROJECT_ID
    secret: mi-tierra-admin-project-id

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: mi-tierra-admin-client-email

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: mi-tierra-admin-private-key
